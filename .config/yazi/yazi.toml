#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
ratio          = [ 1, 4, 3 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "mtime"
show_hidden    = true
show_symlink   = true
scrolloff      = 5

[preview]
wrap       = "no"
tab_size   = 2
max_width  = 600
max_height = 900
image_delay  = 30
image_filter = "triangle"
image_quality = 75

[opener]
edit = [
	{ run = 'nvim "$@"', block = true, for = "unix" },
]
edit-micro = [
	{ run = 'micro "$@"', block = true, for = "unix" },
]
preview-serve = [
	{ run = 'yazi-preview-serve "$@"', block = false, for = "unix" },
]
pdf_open = [
	{ run = 'xdg-open "$1"', desc = "Open", for = "linux" },
]
pdf_marker = [
	{ run = 'HIP_VISIBLE_DEVICES=0 marker_single_gpu "$1" --output_dir "$(dirname "$1")"', desc = "OCR with Marker", for = "unix", block = true },
]
pdf_docling = [
	{ run = 'HIP_VISIBLE_DEVICES=0 docling_single_gpu convert --to md --output "$(dirname "$1")" "$1"', desc = "OCR with Docling", for = "unix", block = true },
]
pdf_split_1 = [
	{ run = 'pdf_split "$1" 1', desc = "Split by Sections", for = "unix", block = true },
]
pdf_split_2 = [
	{ run = 'pdf_split "$1" 2', desc = "Split by Chapters", for = "unix", block = true },
]
pdf_split_3 = [
	{ run = 'pdf_split "$1" 3', desc = "Split by Subsections", for = "unix", block = true },
]

[open]
rules = [
	# Folder
	{ url = "*/", use = [ "edit", "open", "reveal" ] },
	# qmd/md/html — show dropdown with nvim, micro, preview-serve, system open, reveal
	{ url = "*.{qmd,md,html}", use = [ "edit", "edit-micro", "preview-serve", "open", "reveal" ] },
	# Text
	{ mime = "text/*", use = [ "edit", "edit-micro", "open", "reveal" ] },
	# Image
	{ mime = "image/*", use = [ "open", "reveal" ] },
	# Media
	{ mime = "{audio,video}/*", use = [ "play", "reveal" ] },
	# Code
	{ mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [ "edit", "edit-micro", "open", "reveal" ] },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
	# PDF
	{ url = "*.pdf", use = [ "pdf_open", "pdf_marker", "pdf_docling", "pdf_split_1", "pdf_split_2", "pdf_split_3" ] },
	# Empty file
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", use = "download" },
	# Fallback
	{ url = "*", use = [ "open", "reveal" ] },
]

[tasks]
file_workers    = 3
plugin_workers  = 5
fetch_workers   = 5
preload_workers = 2
process_workers = 5
bizarre_retry   = 3
image_alloc     = 536870912
image_bound     = [ 10000, 10000 ]
suppress_preload = false

[plugin]
fetchers = [
	{ url = "*/",         run = "mime.dir",    prio = "high", group = "mime" },
	{ url = "local://*",  run = "mime.local",  prio = "high", group = "mime" },
	{ url = "remote://*", run = "mime.remote", prio = "high", group = "mime" },
]
spotters = [
	{ mime = "multi/*", run = "multi" },
	{ url = "*/", run = "folder" },
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	{ mime = "video/*", run = "video" },
	{ mime = "vfs/*", run = "vfs" },
	{ mime = "null/*", run = "null" },
	{ url = "*", run = "file" },
]
preloaders = [
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	{ mime = "video/*", run = "video" },
	{ mime = "application/pdf", run = "pdf" },
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
]
previewers = [
	{ url = "*/", run = "folder" },
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	{ mime = "application/{json,ndjson}", run = "json" },
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	{ mime = "video/*", run = "video" },
	{ mime = "application/pdf", run = "pdf" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
	{ mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
	{ url = "*.{AppImage,appimage}", run = "archive" },
	{ mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
	{ mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
	{ url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
	{ mime = "inode/empty", run = "empty" },
	{ mime = "vfs/*", run = "vfs" },
	{ mime = "null/*", run = "null" },
	{ url = "*", run = "file" },
]
